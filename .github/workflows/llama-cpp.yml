name: Test llama.cpp

on:
  workflow_dispatch:
  
jobs:
  changelog:
    runs-on: ubuntu-latest
    env:
      MODEL_REPO: unsloth/gemma-4-E4B-it-GGUF
      MODEL_FILE: gemma-4-E4B-it-UD-Q8_K_XL.gguf
      LLAMA_VERSION: b8808
    steps:
    - uses: actions/checkout@v7
    
    - uses: actions/setup-node@v7
      with: { node-version: 24 }
      
    - name: Cache llama.cpp
      id: cache-llama
      uses: actions/cache@v6
      with:
        path: ~/llama
        key: llama-${{ env.LLAMA_VERSION }}-linux-x64
        
    - name: Download llama.cpp
      run: |
        mkdir -p ~/llama
        curl -fSL "https://github.com/ggml-org/llama.cpp/releases/download/${LLAMA_VERSION}/llama-${LLAMA_VERSION}-bin-ubuntu-x64.tar.gz" | tar -xz -C ~/llama --strip-components=1
    
    - name: Cache the model
      id: cache-model
      uses: actions/cache@v6
      with:
        path: ~/models
        key: model-${{ env.MODEL_FILE }}

    - name: Download the model
      if: steps.cache-model.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/models
        curl -fSL "https://huggingface.co/${MODEL_REPO}/resolve/main/${MODEL_FILE}" -o ~/models/${MODEL_FILE}
    
    - name: Fetch website content
      run: |
        pip install requests beautifulsoup4

        # Pull clean article content from Fandom's MediaWiki API instead of
        # scraping the rendered HTML page, which Cloudflare serves as a
        # JS-challenge page to non-browser clients. A browser User-Agent and
        # explicit error checks make sure a block page never silently becomes
        # the model's context.
        cat << 'PYEOF' > fetch.py
        import requests
        from bs4 import BeautifulSoup
        
        API = "https://hitman.fandom.com/api.php"
        headers = {"User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0 Safari/537.36"}
        params = {
            "action": "parse",
            "page": "Elusive_Targets",
            "prop": "text",
            "format": "json",
            "formatversion": "2",
            "redirects": "1",
        }
        
        def html_table_to_markdown(table):
            rows = table.find_all("tr")
            if not rows:
                return ""
            
            markdown_rows = []
            rowspans = {}  # Tracks {col_idx: {"text": str, "span": int}}
            
            for row in rows:
                cells = row.find_all(["th", "td"])
                if not cells:
                    continue
                    
                md_row = []
                col_idx = 0
                cell_idx = 0
                
                while cell_idx < len(cells) or col_idx in rowspans:
                    if col_idx in rowspans and rowspans[col_idx]["span"] > 0:
                        md_row.append(rowspans[col_idx]["text"])
                        rowspans[col_idx]["span"] -= 1
                        if rowspans[col_idx]["span"] <= 0:
                            del rowspans[col_idx]
                        col_idx += 1
                        continue
                        
                    if cell_idx < len(cells):
                        cell = cells[cell_idx]
                        text = cell.get_text(separator=" ", strip=True).replace("|", "\\|")
                        
                        try:
                            r_span = int(cell.get("rowspan", 1))
                        except ValueError:
                            r_span = 1
                            
                        try:
                            c_span = int(cell.get("colspan", 1))
                        except ValueError:
                            c_span = 1
                            
                        for _ in range(c_span):
                            md_row.append(text)
                            if r_span > 1:
                                rowspans[col_idx] = {"text": text, "span": r_span - 1}
                            col_idx += 1
                        
                        cell_idx += 1
                    else:
                        break
                        
                markdown_rows.append(md_row)
                
            if not markdown_rows:
                return ""
                
            result = []
            headers = markdown_rows[0]
            result.append("| " + " | ".join(headers) + " |")
            
            separator = ["---"] * len(headers)
            result.append("| " + " | ".join(separator) + " |")
            
            for row in markdown_rows[1:]:
                while len(row) < len(headers):
                    row.append("")
                row = row[:len(headers)]
                result.append("| " + " | ".join(row) + " |")
                
            return "\n".join(result)
        
        resp = requests.get(API, params=params, headers=headers, timeout=30)
        resp.raise_for_status()
        data = resp.json()
        if "error" in data:
            raise SystemExit(f"MediaWiki API error: {data['error']}")
        
        html = data["parse"]["text"]
        soup = BeautifulSoup(html, "html.parser")
        
        tables = soup.find_all("table", class_="article-table")
        
        table_texts = []
        for table in tables:
            table_texts.append(html_table_to_markdown(table))
        
        final_text = "\n\n".join(table_texts)
        
        # Fail loudly instead of feeding a block page / empty page to the model.
        if not final_text or "enable JavaScript" in final_text:
            raise SystemExit("Page content looks blocked or empty; aborting.")
        
        with open("context.txt", "w", encoding="utf-8") as f:
            f.write(final_text)
        
        print(f"Wrote {len(final_text)} characters to context.txt")
        PYEOF

        python fetch.py
    
    - name: Ask the AI
      run: |
        cat << 'EOF' > prompt.txt
        Based on the provided text, what Elusive targets are currently active? If none are active, please say so. Do not output anything else.
        Here is the scraped text from the Hitman Elusive Targets wiki page:

        EOF

        cat context.txt >> prompt.txt

        cat << 'EOF' >> prompt.txt

        chmod +x ~/llama/llama-cli

        # Run in conversation mode (dropped --no-conversation) so the prompt is
        # wrapped in the model's chat template and the model emits its
        # end-of-turn token. --jinja uses the template baked into the GGUF, -st
        # exits after the single turn, and -n caps output as a hard safety net.
        ~/llama/llama-cli \
          -m ~/models/${MODEL_FILE} \
          -f prompt.txt \
          -c 131072 \
          --jinja \
          -st \
          -n 512 \
          < /dev/null
