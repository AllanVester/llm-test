name: Test llama.cpp

on:
  workflow_dispatch:

jobs:
  changelog:
    runs-on: ubuntu-latest
    env:
      MODEL_REPO: unsloth/gemma-4-E4B-it-GGUF
      MODEL_FILE: gemma-4-E4B-it-UD-Q8_K_XL.gguf
      LLAMA_VERSION: b8808
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v7
      with: { node-version: 24 }

    - name: Cache llama.cpp
      id: cache-llama
      uses: actions/cache@v6
      with:
        path: ~/llama
        key: llama-${{ env.LLAMA_VERSION }}-linux-x64

    - name: Download llama.cpp
      run: |
        mkdir -p ~/llama
        curl -fSL "https://github.com/ggml-org/llama.cpp/releases/download/${LLAMA_VERSION}/llama-${LLAMA_VERSION}-bin-ubuntu-x64.tar.gz" | tar -xz -C ~/llama --strip-components=1

    - name: Cache the model
      id: cache-model
      uses: actions/cache@v6
      with:
        path: ~/models
        key: model-${{ env.MODEL_FILE }}
  
    - name: Download the model
      if: steps.cache-model.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/models
        curl -fSL "https://huggingface.co/${MODEL_REPO}/resolve/main/${MODEL_FILE}" -o ~/models/${MODEL_FILE}

    - name: Fetch website content
      run: |
        # Install beautifulsoup to extract text from HTML cleanly
        pip install requests beautifulsoup4
        
        # Download the webpage and extract just the text into a file called context.txt
        python -c "
        import requests
        from bs4 import BeautifulSoup
        
        url = 'https://hitman.fandom.com/wiki/Elusive_Targets'
        response = requests.get(url)
        soup = BeautifulSoup(response.content, 'html.parser')
        
        # Get text, strip extra whitespace
        text = soup.get_text(separator=' ', strip=True)
        
        with open('context.txt', 'w', encoding='utf-8') as f:
            f.write(text)
        "

    - name: Ask the AI
      run: |
        # Construct the prompt containing your question and the scraped context
        # We use a file to avoid command line length limits
        cat << 'EOF' > prompt.txt
        Here is the scraped text from the Hitman Elusive Targets wiki page:
        
        EOF
        
        cat context.txt >> prompt.txt
        
        cat << 'EOF' >> prompt.txt
        
        Based on the provided text, what Elusive targets are currently active? If none are active, please say so. Do not output anything else.
        EOF
        
        # Make the downloaded llama-cli binary executable
        chmod +x ~/llama/llama-cli
        
        # Run llama-cli (adjust the context size -c based on how much text the wiki page has)
        # Using 8192 context size to ensure the whole wiki page fits
        ~/llama/llama-cli -m ~/models/${MODEL_FILE} -f prompt.txt -c 131072
