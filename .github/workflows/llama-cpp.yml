name: Test llama.cpp

on:
  workflow_dispatch:

jobs:
  changelog:
    runs-on: ubuntu-latest
    env:
      MODEL_REPO: unsloth/gemma-4-E4B-it-GGUF
      MODEL_FILE: gemma-4-E4B-it-UD-Q8_K_XL.gguf
      LLAMA_VERSION: b8808
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v7
      with: { node-version: 24 }

    - name: Cache llama.cpp
      id: cache-llama
      uses: actions/cache@v6
      with:
        path: ~/llama
        key: llama-${{ env.LLAMA_VERSION }}-linux-x64

    - name: Download llama.cpp
      run: |
        mkdir -p ~/llama
        curl -fSL "https://github.com/ggml-org/llama.cpp/releases/download/${LLAMA_VERSION}/llama-${LLAMA_VERSION}-bin-ubuntu-x64.tar.gz" | tar -xz -C ~/llama --strip-components=1

    - name: Cache the model
      id: cache-model
      uses: actions/cache@v6
      with:
        path: ~/models
        key: model-${{ env.MODEL_FILE }}
  
    - name: Download the model
      if: steps.cache-model.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/models
        curl -fSL "https://huggingface.co/${MODEL_REPO}/resolve/main/${MODEL_FILE}" -o ~/models/${MODEL_FILE}

    - name: Fetch website content
      run: |
        pip install requests beautifulsoup4
        
        python -c "
        import requests
        from bs4 import BeautifulSoup
        
        # Use the MediaWiki API instead of the raw webpage to bypass Cloudflare
        url = 'https://hitman.fandom.com/api.php'
        params = {
            'action': 'parse',
            'page': 'Elusive_Targets',
            'format': 'json',
            'prop': 'text'
        }
        
        headers = {'User-Agent': 'Mozilla/5.0'}
        response = requests.get(url, params=params, headers=headers)
        data = response.json()
        
        # The API returns the raw HTML inside the JSON response
        html_content = data['parse']['text']['*']
        
        soup = BeautifulSoup(html_content, 'html.parser')
        text = soup.get_text(separator=' ', strip=True)
        
        with open('context.txt', 'w', encoding='utf-8') as f:
            f.write(text)
        "

    - name: Ask the AI
      run: |
        cat << 'EOF' > prompt.txt
        Here is the scraped text from the Hitman Elusive Targets wiki page:
        
        EOF
        
        cat context.txt >> prompt.txt
        
        cat << 'EOF' >> prompt.txt
        
        Based on the provided text, what Elusive targets are currently active? If none are active, please say so. Do not output anything else.
        EOF
        
        chmod +x ~/llama/llama-cli
        
        ~/llama/llama-cli \
          -m ~/models/${MODEL_FILE} \
          -f prompt.txt \
          -c 131072 \
          --no-conversation < /dev/null
